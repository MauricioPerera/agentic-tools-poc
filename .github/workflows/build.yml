name: Build registry → dist branch
on:
  push:
    branches: [main]
    paths:
      - 'registry/**'
      - 'scripts/**'
      - 'schema/**'
      - 'client/**'
      - 'types/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-registry
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Seed dist/ with archived versions from the dist branch
        # Per-skill versioning (#2): the manifest builder must see existing
        # `dist/skills/<slug>@<v>.mjs` archive files to (a) detect any
        # bump-without-bump, and (b) populate `tools[].versions[]`. The
        # archive lives on the dist branch; pull it forward into the main
        # checkout's dist/ before npm run all builds + manifests.
        # build.ts is now selective — it wipes only `<slug>.mjs` (latest)
        # and leaves `<slug>@<v>.mjs` (archive) intact.
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin dist > /dev/null 2>&1; then
            mkdir -p dist/skills
            git fetch origin dist
            # Use git archive to extract only skills/*@*.mjs files from the
            # dist branch tree, without checking it out.
            git --git-dir=.git archive --format=tar origin/dist -- 'skills/' \
              | tar -xf - -C dist/ --wildcards 'skills/*@*.mjs' || true
            count=$(find dist/skills -name '*@*.mjs' 2>/dev/null | wc -l)
            echo "✓ seeded $count archived version(s) from dist branch"
          else
            echo "no dist branch yet — first build, no archive to seed"
          fi

      - name: Run full pipeline (typecheck, test, validate, lint, codegen:check, build, manifest)
        run: npm run all

      - name: Publish dist/ to `dist` branch
        run: |
          set -euo pipefail

          # Build artefacts live at ./dist after `npm run all`.
          # We push them to a dedicated `dist` branch so:
          #   - main stays free of generated files (no commit churn)
          #   - jsDelivr serves cleanly from `@dist` instead of `@main/dist`
          #   - the build branch's git history is purely a log of registry releases

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          MAIN_SHA=$(git rev-parse HEAD)
          MAIN_SHORT=${MAIN_SHA:0:7}
          MSG="build: dist for ${MAIN_SHORT}"

          # Create an orphan worktree for the dist branch
          git worktree add --detach /tmp/dist
          cd /tmp/dist

          # Switch to or create the dist branch (orphan = no shared history)
          if git ls-remote --exit-code --heads origin dist > /dev/null 2>&1; then
            git fetch origin dist
            git checkout dist
            git pull origin dist
          else
            git checkout --orphan dist
            git rm -rf . 2>/dev/null || true
          fi

          # Replace manifest + latest skill files. Per-skill archive
          # (`skills/<slug>@<v>.mjs`) is preserved indefinitely — never
          # delete archived versions, only overlay new latest + new
          # archive entries from this build.
          rm -f ./manifest.json
          # Remove latest-version files only; keep archive.
          if [ -d ./skills ]; then
            find ./skills -maxdepth 1 -type f -name '*.mjs' ! -name '*@*' -delete
          fi
          cp -r "$GITHUB_WORKSPACE/dist/." .

          # README so visitors landing on the branch know what they're seeing
          cat > README.md <<EOF
          # dist branch

          Auto-generated build artefacts for the agentic-tools-poc registry.

          Sources live on \`main\` — see https://github.com/MauricioPerera/agentic-tools-poc

          Distributed publicly via jsDelivr:

          - Manifest: \`https://cdn.jsdelivr.net/gh/MauricioPerera/agentic-tools-poc@dist/manifest.json\`
          - Skills:   \`https://cdn.jsdelivr.net/gh/MauricioPerera/agentic-tools-poc@dist/skills/<slug>.mjs\`

          Last build: ${MAIN_SHORT} on \$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "${MSG}"
            git push origin dist
            echo "✓ Published dist/ to \`dist\` branch (from main ${MAIN_SHORT})"
          else
            echo "dist/ unchanged — nothing to publish."
          fi
