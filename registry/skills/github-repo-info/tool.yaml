slug: github-repo-info
name: GitHub Repo Info
summary: Look up a public GitHub repo's stars, language, description, default branch, and last push.
version: 1.0.0
capabilities: [network, lookup, github]
sideEffects: read
inputSchema:
  type: object
  required: [owner, repo]
  properties:
    owner:
      type: string
      description: "GitHub user or org owning the repo, e.g. 'cloudflare'."
    repo:
      type: string
      description: "Repo name without owner, e.g. 'workers-sdk'."
outputSchema:
  type: object
  properties:
    full_name:
      type: string
      description: "owner/repo identifier."
    description:
      type: string
      description: "Repo description (may be empty string if unset)."
    stars:
      type: integer
      description: "Star count at fetch time."
    language:
      type: string
      description: "Primary language detected by GitHub linguist (may be empty)."
    default_branch:
      type: string
      description: "Default branch name, e.g. 'main' or 'master'."
    pushed_at:
      type: string
      description: "ISO 8601 timestamp of the most recent push to any branch."
    url:
      type: string
      description: "Public html_url of the repo."
requiredEnv: [GITHUB_TOKEN]    # optional — improves rate limit if set
networkPolicy:
  allow: [api.github.com]
