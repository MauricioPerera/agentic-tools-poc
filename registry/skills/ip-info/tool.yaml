slug: ip-info
name: IP Info
summary: Returns public IP and country code via api.country.is
version: 1.1.0
capabilities: [network, lookup]
sideEffects: read
inputSchema:
  type: object
  properties:
    ip:
      type: string
      description: "IP to look up. Defaults to the caller's public IP."
outputSchema:
  type: object
  properties:
    ip:      { type: string }
    country: { type: string, description: "ISO 3166-1 alpha-2 country code" }
networkPolicy:
  allow: [api.country.is]

# Per-model variants of this skill. The loader picks the matching block when
# the active model name matches a key (substring match). This is the "tuning"
# layer of a skill — owned by the agent's author, not the API vendor.
#
# Hermes 2 Pro Mistral 7B insists on filling every optional schema field even
# when the description says "defaults to caller's public IP". It also gives up
# after a single failure. The override removes the parameter entirely (so it
# can't be filled wrong) and rewrites the description to discourage retreat.
model_overrides:
  hermes:
    summary: |
      Returns YOUR own public IP and country code. Takes no arguments — call
      with empty object {}. Never invent IP addresses; never give up if it
      fails, retry with a different approach.
    inputSchema:
      type: object
      properties: {}
    # Aggregated across all skills into a "MODEL-SPECIFIC INSTRUCTIONS"
    # section appended to the agent's system prompt by skill-tuning.mjs.
    system_prompt_fragments:
      - "Never invent IP addresses or country codes — always call ip-info."
      - "If a tool fails, retry with different arguments. Never apologize and quit."
