slug: ip-info
name: IP Info
summary: Returns public IP and country code via api.country.is
version: 1.0.1
capabilities: [network, lookup]
sideEffects: read
inputSchema:
  type: object
  properties:
    ip:
      type: string
      description: "IP to look up. Defaults to the caller's public IP."
outputSchema:
  type: object
  properties:
    ip:      { type: string }
    country: { type: string, description: "ISO 3166-1 alpha-2 country code" }
networkPolicy:
  allow: [api.country.is]
